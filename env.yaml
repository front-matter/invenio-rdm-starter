meta:
  name: InvenioDRM Starter
  description: Envy configuration to manage compose.yaml and .env files.
  version: v1
services:
  cache:
    image: valkey/valkey:7.2.5-bookworm
    command: ["valkey-server", "--loglevel", "warning"]
  db:
    image: postgres:17.4-bookworm
    groups: [db]
  proxy:
    image: caddy:2.10
  search:
    image: opensearchproject/opensearch:2.18.0
    groups: [search]
  web:
    image: ghcr.io/front-matter/invenio-rdm-starter:latest
    platform: linux/amd64
    groups: [common, web, mail, s3]
  worker:
    image: ghcr.io/front-matter/invenio-rdm-starter:latest
    platform: linux/amd64
    command:
      [
        "celery",
        "-A",
        "invenio_app.celery",
        "worker",
        "--beat",
        "--schedule=/tmp/celerybeat-schedule",
        "--events",
        "--loglevel=WARNING",
      ]
    groups: [common, mail, s3]
groups:
  common:
    description: "Shared environment variables for web and worker."
    link: https://inveniordm.docs.cern.ch/operate/customize/i18n-and-l10n/
    vars:
      INVENIO_BABEL_DEFAULT_LOCALE:
        description: "The default locale used by InvenioRDM."
        default: "en"
      INVENIO_ISO639_LANGUAGES:
        description: "Other supported languages (do not include INVENIO_BABEL_DEFAULT_LOCALE in list)."
        default: "fr,de,es,pt"
      INVENIO_BABEL_DEFAULT_TIMEZONE:
        description: "The default timezone used by InvenioRDM."
        default: "UTC"
      INVENIO_LOGGING_CONSOLE_LEVEL:
        default: "INFO"
      INVENIO_RDM_CITATION_STYLES:
        default: "apa,chicago-author-date,harvard-cite-them-right,ieee,vancouver"
      INVENIO_RDM_CITATION_STYLES_DEFAULT:
        description: "The default citation style used by InvenioRDM, using the CSL symbol."
        example: "apa"
      INVENIO_SEARCH_HOSTS:
        default: "['search:9200']"
      INVENIO_SEARCH_INDEX_PREFIX:
        default: "invenio-rdm-"
  mail:
    description: "Email configuration."
    link: https://inveniordm.docs.cern.ch/operate/customize/emails/
    vars:
      INVENIO_MAIL_SUPPRESS_SEND:
        description: "Set to `true` to suppress sending emails. Useful for development and testing."
        default: "true"
      INVENIO_MAIL_SERVER:
        default: "127.0.0.1"
        example: "smtp.gmail.com"
      INVENIO_MAIL_PORT:
        default: "25"
        example: "587"
      INVENIO_MAIL_USE_TLS:
        default: "false"
      INVENIO_MAIL_USE_SSL:
        default: "false"
      INVENIO_MAIL_USERNAME:
        default: "info"
      INVENIO_MAIL_PASSWORD:
        default: ""
      INVENIO_ADMIN_EMAIL:
        description: "Email address used as sender of account registration emails."
        default: "info@inveniosoftware.org"
      INVENIO_SECURITY_EMAIL_SENDER:
        default: "{INVENIO_ADMIN_EMAIL}"
  s3:
    description: "S3 compatible storage backend."
    link: https://inveniordm.docs.cern.ch/operate/customize/file-uploads/s3/
    vars:
      INVENIO_S3_ENDPOINT_URL:
        default: ""
        example: "https://s3.amazonaws.com"
      INVENIO_S3_BUCKET_NAME:
        default: ""
      INVENIO_S3_ACCESS_KEY_ID:
        default: ""
      INVENIO_S3_SECRET_ACCESS_KEY:
        default: ""
      INVENIO_S3_REGION_NAME:
        default: "us-east-1"
  doi:
    description: "DOI registration configuration."
    link: https://inveniordm.docs.cern.ch/operate/customize/dois/
    vars:
      INVENIO_DATACITE_DATACENTER_SYMBOL:
        default: ""
        example: "CERN.ZENODO"
      INVENIO_DATACITE_ENABLED:
        description: "Set to `true` to enable DataCite DOI registration."
        default: "false"
      INVENIO_DATACITE_PREFIX:
        default: ""
      INVENIO_DATACITE_TEST_MODE:
        default: "false"
      INVENIO_DATACITE_USERNAME:
        default: ""
      INVENIO_RDM_ALLOW_EXTERNAL_DOI_VERSIONING:
        default: "false"
      INVENIO_RDM_ALLOW_METADATA_ONLY_RECORDS:
        default: "true"
      INVENIO_RDM_ALLOW_RESTRICTED_RECORDS:
        default: "true"
  cache:
    description: Redis/Valkey configuration for broker and cache.
    vars:
      INVENIO_ACCOUNTS_SESSION_REDIS_URL:
        default: ""
        example: "redis://cache:6379/0"
      INVENIO_CELERY_BROKER_URL:
        default: ""
        example: "redis://cache:6379/1"
      INVENIO_CELERY_RESULT_BACKEND:
        default: ""
        example: "redis://cache:6379/2"
      INVENIO_RATELIMIT_STORAGE_URL:
        default: ""
        example: "redis://cache:6379/3"
      INVENIO_CACHE_REDIS_URL:
        default: ""
        example: "redis://cache:6379/4"
  db:
    description: "Database configuration."
    vars:
      POSTGRES_HOST:
        default: ""
      POSTGRES_DB:
        default: "inveniordm"
      POSTGRES_USER:
        default: "inveniordm"
      POSTGRES_PASSWORD:
        default: ""
        secret: "true"
      INVENIO_SQLALCHEMY_DATABASE_URI:
        description: "The Postgres database URI used by InvenioRDM."
        default: "postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:5432/${POSTGRES_DB}"
  search:
    description: "Opensearch configuration."
    vars:
      DISABLE_INSTALL_DEMO_CONFIG:
        default: "true"
      DISABLE_SECURITY_PLUGIN:
        default: "true"
      OPENSEARCH_JAVA_OPTS:
        description: "Java configuration. Adjust memory for production service."
        default: "-Xms512m -Xmx512m"
      bootstrap.memory_lock:
        default: "true"
      discovery.type:
        description: "Run in cluster mode for better performance and resilience."
        default: "single-node"
  web:
    description: "Web configuration."
    link: https://inveniordm.docs.cern.ch/operate/customize/look-and-feel/
    vars:
      INVENIO_SITE_UI_URL:
        default: "https://localhost"
      INVENIO_SITE_API_URL:
        default: "https://localhost/api"
      INVENIO_TRUSTED_HOSTS:
        description: >
          The trusted hosts for InvenioRDM. Set to specific 
          IP addresses or hostnames in publicly accessible deployments."
        default: "['0.0.0.0', 'localhost', '127.0.0.1']"
      INVENIO_THEME_FRONTPAGE_TITLE:
        default: "InvenioRDM Starter"
      INVENIO_THEME_FRONTPAGE_SUBTITLE:
        default: "A starter project for the turn-key research data management repository."
      INVENIO_THEME_LOGO:
        default: "images/invenio-rdm.svg"
      INVENIO_THEME_SHOW_FRONTPAGE_INTRO_SECTION:
        description: "Set to `true` to show the frontpage intro section."
        default: "false"
      INVENIO_THEME_SITENAME:
        default: "InvenioRDM Starter"
  authentication:
    description: "Authentication configuration."
    link: https://inveniordm.docs.cern.ch/operate/customize/authentication/
    vars:
      INVENIO_ACCOUNTS_DEFAULT_USER_VISIBILITY:
        default: "restricted"
      INVENIO_ACCOUNTS_LOCAL_LOGIN_ENABLED:
        default: "true"
      INVENIO_OAUTHCLIENT_AUTO_REDIRECT_TO_EXTERNAL_LOGIN:
        default: "false"
      INVENIO_OIDC_APP_CREDENTIALS_CONSUMER_KEY:
        default: ""
      INVENIO_OIDC_ISSUER:
        default: ""
      INVENIO_SECURITY_CHANGEABLE:
        description: "Allow password change by users."
        default: "true"
      INVENIO_SECURITY_CONFIRMABLE:
        description: "Allow user to confirm their email address."
        default: "true"
      INVENIO_SECURITY_LOGIN_WITHOUT_CONFIRMATION:
        default: "true"
      INVENIO_SECURITY_RECOVERABLE:
        description: "Allow password recovery by users."
        default: "true"
      INVENIO_SECURITY_REGISTERABLE:
        description: "Allow users to register."
        default: "true"
      INVENIO_SECURITY_TRACKABLE:
        description: "Enable user tracking on login."
        default: "true"
      INVENIO_USERPROFILES_READ_ONLY:
        default: "true"
